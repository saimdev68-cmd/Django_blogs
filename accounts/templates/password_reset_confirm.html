{% extends "base.html" %}

{% block title %}Set New Password | Modern Read{% endblock %}

{% block content %}
<main class="min-h-[80vh] flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md">
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-50 text-blue-600 rounded-full mb-6">
                <i class="fa-solid fa-lock-open text-2xl"></i>
            </div>
            <p class="text-xs font-bold text-blue-600 uppercase tracking-widest mb-2">Final Step</p>
            <h1 class="text-3xl font-bold text-gray-900">Set New Password</h1>
            <p class="text-sm text-gray-500 mt-2 px-6">Please enter and confirm your new secure password below.</p>
        </div>
        <div class="bg-white border border-gray-100 rounded-sm p-8 shadow-sm">
            <form action="" method="post" class="space-y-6">
                {% csrf_token %}
                <div class="django-form-container">
                    {{ form.as_p }}
                </div>
                <button type="submit" class="w-full bg-black text-white font-bold py-3 uppercase tracking-widest text-xs hover:bg-gray-800 transition-colors shadow-sm">
                    Reset Password
                </button>
            </form>
            <div class="mt-8 pt-6 border-t border-gray-50 text-center">
                <a href="{% url 'accounts:login' %}" class="text-sm font-medium text-gray-500 hover:text-black transition-colors">
                    Back to login
                </a>
            </div>
        </div>
    </div>
</main>
{% endblock %}
