{% extends "base.html" %}

{% block title %}Verify OTP | Modern Read{% endblock %}

{% block content %}
<main class="min-h-[80vh] flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md">
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-50 text-blue-600 rounded-full mb-6">
                <i class="fa-solid fa-shield-halved text-2xl"></i>
            </div>
            <p class="text-xs font-bold text-blue-600 uppercase tracking-widest mb-2">Security Verification</p>
            <h1 class="text-3xl font-bold text-gray-900">Enter your OTP</h1>
            <p class="text-sm text-gray-500 mt-2">Please check your email for the verification code.</p>
        </div>
        <div class="bg-white border border-gray-100 rounded-sm p-8 shadow-sm">
            <form action="" method="post" class="space-y-6">
                {% csrf_token %}
                <div class="django-form-container">
                    {{ form.as_p }}
                </div>
                <button type="submit" class="w-full bg-black text-white font-bold py-3 uppercase tracking-widest text-xs hover:bg-gray-800 transition-colors shadow-sm">
                    Verify Code
                </button>
            </form>
            <div class="mt-8 pt-6 border-t border-gray-50 flex flex-col items-center gap-4">
                <form action="{% url 'accounts:otp_resend' %}" method="post" class="w-full">
                    {% csrf_token %}
                    <button type="submit" class="w-full py-2 text-sm font-bold text-gray-900 border border-gray-200 rounded-sm hover:bg-gray-50 transition-colors uppercase tracking-tighter">
                        Resend OTP
                    </button>
                </form>
                <a href="{% url 'accounts:signup' %}" class="text-xs font-medium text-gray-400 hover:text-black transition-colors uppercase tracking-widest">
                    ← Back to signup
                </a>
            </div>
        </div>
    </div>
</main>
{% endblock %}
