{% extends "base.html" %}

{% block title %}Reset Password | Modern Read{% endblock %}

{% block content %}
<main class="min-h-[80vh] flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md">
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-gray-50 text-gray-400 rounded-full mb-6">
                <i class="fa-solid fa-key text-2xl"></i>
            </div>
            <p class="text-xs font-bold text-blue-600 uppercase tracking-widest mb-2">Account Recovery</p>
            <h1 class="text-3xl font-bold text-gray-900">Forgot Password?</h1>
            <p class="text-sm text-gray-500 mt-2 px-6">Enter your email address and we'll send you a link to reset your password.</p>
        </div>
        <div class="bg-white border border-gray-100 rounded-sm p-8 shadow-sm">
            <form action="" method="post" class="space-y-6">
                {% csrf_token %}
                <div class="django-form-container">
                    {{ form.as_p }}
                </div>
                <button type="submit" class="w-full bg-black text-white font-bold py-3 uppercase tracking-widest text-xs hover:bg-gray-800 transition-colors shadow-sm">
                    Send Reset Link
                </button>
            </form>
            <div class="mt-8 pt-6 border-t border-gray-50 text-center">
                <a href="{% url 'accounts:login' %}" class="text-sm font-medium text-gray-500 hover:text-black transition-colors flex items-center justify-center gap-2">
                    <i class="fa-solid fa-arrow-left text-xs"></i> Back to login
                </a>
            </div>
        </div>
    </div>
</main>
{% endblock %}
