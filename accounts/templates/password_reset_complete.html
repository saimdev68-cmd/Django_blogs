{% extends "base.html" %}

{% block title %}Password Updated | Modern Read{% endblock %}

{% block content %}
<main class="min-h-[80vh] flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md text-center">
        <div class="inline-flex items-center justify-center w-20 h-20 bg-blue-50 text-blue-600 rounded-full mb-8">
            <i class="fa-solid fa-circle-check text-3xl"></i>
        </div>
        <div class="mb-10">
            <p class="text-xs font-bold text-green-600 uppercase tracking-widest mb-2">Success</p>
            <h1 class="text-3xl font-bold text-gray-900 mb-4">Password changed</h1>
            <p class="text-gray-500 leading-relaxed px-4">
                Your password has been updated successfully. You can now use your new password to log in to your account.
            </p>
        </div>
        <div class="pt-6 border-t border-gray-100">
            <a href="{% url 'accounts:login' %}" class="inline-block w-full bg-black text-white font-bold py-4 uppercase tracking-widest text-xs hover:bg-gray-800 transition-colors shadow-sm">
                Login Now
            </a>
        </div>
    </div>
</main>
{% endblock %}
