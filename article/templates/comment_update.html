{% extends "base.html" %}

{% block title %}Update Comment | Modern Read{% endblock %}

{% block content %}
<main class="max-w-2xl mx-auto px-4 py-20">
    <div class="mb-10 text-center">
        <h2 class="text-3xl font-bold tracking-tight text-gray-900 uppercase tracking-tighter">Edit Your Comment</h2>
        <p class="text-gray-500 mt-2">Adjust your contribution to the discussion.</p>
    </div>

    <div class="bg-gray-50 p-8 rounded-sm shadow-sm border border-gray-100">
        <form action="" method="post" class="space-y-6">
            {% csrf_token %}
            
            <div class="comment-update-form">
                {{ form.as_p }}
            </div>

            <div class="flex items-center justify-between pt-4">
                <a href="{% url 'article:detail' article.id %}" class="text-xs font-bold uppercase tracking-widest text-gray-400 hover:text-black transition-colors">
                    <i class="fa-solid fa-arrow-left mr-2"></i> Cancel
                </a>
                <button type="submit" class="bg-black text-white px-8 py-3 text-xs font-bold uppercase tracking-widest hover:bg-gray-800 transition-colors shadow-md">
                    Update Comment
                </button>
            </div>
        </form>
    </div>
</main>
{% endblock %}
